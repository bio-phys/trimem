name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8"]

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<1.22"
          cd OpenMesh; git apply ../om-patch; cd ..
          pip install -v .[tests]
      - name: run debug test
        run: |
          python -c "import trimesh;\
                     m = trimesh.creation.icosphere(3);\
                     m.export('inp.stl')"
          testd inp.stl 0.15
          sudo apt-get install valgrind
          valgrind --tool=none mc_app config --strip --conf inp.cfg
      - name: run test
        run: |
          pytest -v tests
